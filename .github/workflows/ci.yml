name: Frontend CI to Docker Hub

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v2
      
      - name: install dependencies
        run: npm install
      
      - name: run build
        run: npm run build
      
      - name: run tests
        run: CI=true npm test
  prepare:
    needs: build-test
    runs-on: ubuntu-latest
    environment: Development
    if: github.ref == 'refs/heads/main'

    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest
  
  deploy:
    needs: prepare
    runs-on: [self-hosted, backend]
    environment: Development
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest

      - name: Create runtime .env file
        run: |
          echo "REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}" > .env

      - name: Run Docker container
        run: |
          docker rm -f my-frontend-container || true
          docker run -d --name my-frontend-container -p 3000:3000 --env-file .env ${{ secrets.DOCKER_USERNAME }}/my-frontend:latest

        
